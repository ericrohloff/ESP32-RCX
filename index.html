<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>ESP32-RCX Programmer</title>
        <link rel="stylesheet" href="styles.css" />
        <link
            rel="stylesheet"
            href="https://pyscript.net/releases/2025.5.1/core.css"
        />
        <script
            type="module"
            src="https://pyscript.net/releases/2025.5.1/core.js"
        ></script>
        <script src="/mini-coi.js"></script>
    </head>
    <body>
        <script type="py" src="main.py" config="pyscript.toml"></script>
        <script
            type="py"
            src="control_panel.py"
            config="pyscript.toml"
        ></script>
        <header class="app-header">
            <div class="header-content">
                <h1>ESP32-RCX Programmer</h1>
                <nav class="header-nav">
                    <a href="commands.html" class="header-link" target="_blank"
                        >Commands</a
                    >
                </nav>
            </div>
        </header>

        <div class="container">
            <div class="rs232-area">
                <script
                    type="mpy-editor"
                    src="./main.py"
                    config="./pyscript.toml"
                    env="su25"
                    setup
                ></script>
                <div id="all_things_rs232"></div>
            </div>

            <div class="control-panel">
                <h3 style="margin-top: 0">Live Diagnostics</h3>
                <button class="btn-test" py-click="live_ping">Ping RCX</button>
                <button class="btn-test" py-click="live_beep">Play Beep</button>
                <div class="packet-stream-container">
                    <h4>Packet Visualizer</h4>
                    <button class="btn-clear" py-click="clear_visualizer">
                        Clear
                    </button>
                    <div
                        id="packet-stream"
                        style="
                            background: #111;
                            height: 120px;
                            overflow-y: auto;
                            padding: 10px;
                            border-radius: 4px;
                            border: 1px solid #444;
                        "
                    ></div>

                    <div class="legend">
                        <span><b style="color: #2980b9">■</b> Preamble</span>
                        <span><b style="color: #27ae60">■</b> OpCode</span>
                    </div>
                </div>

                <div style="margin-top: 16px">
                    <h4 style="margin: 0 0 8px 0; font-size: 0.95rem">
                        Code Templates
                    </h4>
                    <select
                        id="template-select"
                        style="
                            width: 100%;
                            padding: 6px;
                            border-radius: 5px;
                            border: 1px solid var(--border);
                            margin-bottom: 6px;
                            background: white;
                        "
                    >
                        <option value="">— choose template —</option>
                        <option value="beep_test">Beep Test</option>
                        <option value="move_forward">Move Forward (2 s)</option>
                        <option value="drive_pattern">Drive Pattern</option>
                        <option value="motor_test">Motor A / B Test</option>
                        <option value="spin_turn">Spin Left &amp; Right</option>
                    </select>
                    <button
                        id="btn-load-template"
                        style="
                            width: 100%;
                            padding: 7px;
                            background: var(--glass);
                            border: 1px solid var(--border);
                            border-radius: 5px;
                            cursor: pointer;
                            font-weight: 600;
                            font-size: 12px;
                        "
                    >
                        Load Template
                    </button>
                </div>
            </div>
        </div>
    </body>
</html>
