<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>ESP32-RCX Programmer</title>
        <link rel="stylesheet" href="styles.css" />
        <link
            rel="stylesheet"
            href="https://pyscript.net/releases/2025.5.1/core.css"
        />
        <script
            type="module"
            src="https://pyscript.net/releases/2025.5.1/core.js"
        ></script>
        <script src="/mini-coi.js"></script>
    </head>
    <body>
        <script type="py" src="pyscript/main.py" config="pyscript.toml"></script>
        <script
            type="py"
            src="pyscript/control_panel.py"
            config="pyscript.toml"
        ></script>
        <header class="app-header">
            <div class="header-content">
                <h1>ESP32-RCX Programmer</h1>
                <nav class="header-nav">
                    <a href="#" class="header-link" id="open-commands-btn">Commands</a>
                </nav>
            </div>
        </header>

        <div class="container">
            <div class="rs232-area">
                <script
                    type="mpy-editor"
                    src="./pyscript/main.py"
                    config="./pyscript.toml"
                    env="su25"
                    setup
                ></script>
                <div id="all_things_rs232"></div>
            </div>

            <div class="control-panel">
                <h3 style="margin-top: 0">Packet Preview</h3>
                <p
                    style="
                        margin: 0 0 10px 0;
                        font-size: 0.9rem;
                        color: #6b7280;
                    "
                >
                    Select a template to see the expected IR packets it will
                    generate. This helps you understand what commands each
                    template sends to the RCX.
                </p>
                <div class="packet-stream-container">
                    <h4>Expected Packets</h4>
                    <button class="btn-clear">Clear</button>
                    <div
                        id="packet-stream"
                        style="
                            background: #f9fafb;
                            height: 250px;
                            overflow-y: auto;
                            padding: 10px;
                            border-radius: 4px;
                            border: 1px solid #e5e7eb;
                        "
                    >
                        <div style="color: #9ca3af; font-size: 0.9rem">
                            Select a template to preview packets →
                        </div>
                    </div>
                </div>

                <div style="margin-top: 16px">
                    <h4 style="margin: 0 0 8px 0; font-size: 0.95rem">
                        Code Templates
                    </h4>
                    <select
                        id="template-select"
                        style="
                            width: 100%;
                            padding: 6px;
                            border-radius: 5px;
                            border: 1px solid var(--border);
                            margin-bottom: 6px;
                            background: white;
                        "
                    >
                        <option value="">— choose template —</option>
                        <option value="beep_test">Beep Test</option>
                        <option value="move_forward">Move Forward (2 s)</option>
                        <option value="drive_pattern">Drive Pattern</option>
                        <option value="motor_test">Motor A / B Test</option>
                        <option value="spin_turn">Spin Left &amp; Right</option>
                        <option value="square_pattern">Square Pattern</option>
                        <option value="acceleration">Speed Test</option>
                    </select>
                    <button
                        id="btn-load-template"
                        style="
                            width: 100%;
                            padding: 7px;
                            background: var(--glass);
                            border: 1px solid var(--border);
                            border-radius: 5px;
                            cursor: pointer;
                            font-weight: 600;
                            font-size: 12px;
                        "
                    >
                        Load Template
                    </button>
                </div>
            </div>
        </div>
    <!-- Commands modal -->
    <div id="commands-modal" style="display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.5);">
        <div style="position:absolute; inset:0; display:flex; flex-direction:column; margin:24px; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.3);">
            <div style="display:flex; align-items:center; justify-content:space-between; padding:12px 20px; border-bottom:1px solid #e5e7eb; flex-shrink:0;">
                <strong>RCX Library Reference</strong>
                <button id="close-commands-btn" style="font-size:1.2rem; background:none; border:none; cursor:pointer; color:#6b7280; padding:4px 8px;">✕</button>
            </div>
            <iframe src="commands.html" style="flex:1; border:none; width:100%;"></iframe>
        </div>
    </div>
    <script>
        document.getElementById('open-commands-btn').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('commands-modal').style.display = 'block';
        });
        document.getElementById('close-commands-btn').addEventListener('click', function() {
            document.getElementById('commands-modal').style.display = 'none';
        });
        document.getElementById('commands-modal').addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });
    </script>
    </body>
</html>
